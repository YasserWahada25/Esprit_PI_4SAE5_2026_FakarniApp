apiVersion: apps/v1
kind: Deployment
metadata:
  name: meeting-insights-service
  namespace: fakarni
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meeting-insights-service
  template:
    metadata:
      labels:
        app: meeting-insights-service
    spec:
      containers:
        - name: meeting-insights-service
          image: didou2505/fakarni-meeting-insights-service:latest
          ports:
            - containerPort: 8096
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: fakarni-config
                  key: EUREKA_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: meeting-insights-service
  namespace: fakarni
spec:
  selector:
    app: meeting-insights-service
  ports:
    - port: 8096
      targetPort: 8096
  type: ClusterIP
