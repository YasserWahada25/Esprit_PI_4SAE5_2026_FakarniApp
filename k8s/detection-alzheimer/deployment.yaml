apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection-alzheimer
  namespace: fakarni
spec:
  replicas: 1
  selector:
    matchLabels:
      app: detection-alzheimer
  template:
    metadata:
      labels:
        app: detection-alzheimer
    spec:
      initContainers:
        - name: wait-for-eureka
          image: busybox:1.35
          command: ['sh', '-c', 'until wget -qO- http://eureka-server:8761/actuator/health 2>/dev/null | grep -q UP; do echo waiting for eureka; sleep 5; done; echo eureka is ready']
      containers:
        - name: detection-alzheimer
          image: didou2505/fakarni-detection-alzheimer:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "1536Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: detection-alzheimer
  namespace: fakarni
spec:
  selector:
    app: detection-alzheimer
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP


