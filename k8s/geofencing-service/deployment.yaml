apiVersion: apps/v1
kind: Deployment
metadata:
  name: geofencing-service
  namespace: fakarni
spec:
  replicas: 1
  selector:
    matchLabels:
      app: geofencing-service
  template:
    metadata:
      labels:
        app: geofencing-service
    spec:
      containers:
        - name: geofencing-service
          image: didou2505/fakarni-geofencing-service:latest
          ports:
            - containerPort: 9012
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: fakarni-config
                  key: EUREKA_URL
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://db-geofencing:3306/db_geofencing?createDatabaseIfNotExist=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fakarni-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fakarni-secrets
                  key: MAIL_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fakarni-secrets
                  key: MAIL_PASSWORD
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: fakarni-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fakarni-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_FROM_NUMBER
              valueFrom:
                secretKeyRef:
                  name: fakarni-secrets
                  key: TWILIO_FROM_NUMBER
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: geofencing-service
  namespace: fakarni
spec:
  selector:
    app: geofencing-service
  ports:
    - port: 9012
      targetPort: 9012
  type: ClusterIP
