apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: fakarni
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'eureka-server'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['eureka-server:8761']

      - job_name: 'api-gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['api-gateway:8090']

      - job_name: 'user-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['user-service:8081']

      - job_name: 'activite-educative-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['activite-educative-service:8084']

      - job_name: 'chat-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['chat-service:8070']

      - job_name: 'detection-maladie-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['detection-maladie-service:8058']

      - job_name: 'dossier-medical-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['dossier-medical-service:8059']

      - job_name: 'event-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['event-service:8087']

      - job_name: 'geofencing-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['geofencing-service:9012']

      - job_name: 'group-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['group-service:8097']

      - job_name: 'meeting-insights-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['meeting-insights-service:8096']

      - job_name: 'post-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['post-service:8069']

      - job_name: 'session-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['session-service:8071']

      - job_name: 'suivi-engagement-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['suivi-engagement-service:8088']

      - job_name: 'tracking-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['tracking-service:9011']

      - job_name: 'detection-alzheimer'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['detection-alzheimer:5000']
