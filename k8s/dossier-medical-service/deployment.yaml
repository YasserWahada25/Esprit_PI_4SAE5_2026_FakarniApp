apiVersion: apps/v1
kind: Deployment
metadata:
  name: dossier-medical-service
  namespace: fakarni
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dossier-medical-service
  template:
    metadata:
      labels:
        app: dossier-medical-service
    spec:
      containers:
        - name: dossier-medical-service
          image: didou2505/fakarni-dossier-medical-service:latest
          ports:
            - containerPort: 8059
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: fakarni-config
                  key: EUREKA_URL
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://db-dossier-medical:3306/dossier_medical_db?createDatabaseIfNotExist=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fakarni-secrets
                  key: MYSQL_ROOT_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: dossier-medical-service
  namespace: fakarni
spec:
  selector:
    app: dossier-medical-service
  ports:
    - port: 8059
      targetPort: 8059
  type: ClusterIP
