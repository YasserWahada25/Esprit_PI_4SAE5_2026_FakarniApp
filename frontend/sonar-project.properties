# SonarQube Configuration for Angular Frontend
sonar.projectKey=fakarni-frontend
sonar.projectName=Fakarni Frontend
sonar.projectVersion=1.0

# Source directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# TypeScript/JavaScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/environments/**,**/*.module.ts
sonar.test.exclusions=**/node_modules/**,**/dist/**

# SonarQube server
sonar.host.url=http://localhost:9000
