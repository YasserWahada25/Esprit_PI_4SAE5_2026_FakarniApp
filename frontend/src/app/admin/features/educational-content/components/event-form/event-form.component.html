<h2 mat-dialog-title>{{ isEditMode ? 'Modifier' : 'Planifier' }} un Événement</h2>
<mat-dialog-content>
  <form [formGroup]="eventForm">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Titre de l'événement *</mat-label>
      <input matInput formControlName="title" placeholder="Ex: Atelier mémoire">
      <mat-error *ngIf="eventForm.get('title')?.invalid">Le titre est obligatoire</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput rows="3" formControlName="description" placeholder="Détails sur le contenu éducatif, objectifs, public cible..."></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date et heure de début *</mat-label>
      <input matInput type="datetime-local" formControlName="startDateTime">
      <mat-error *ngIf="eventForm.get('startDateTime')?.invalid">La date est obligatoire</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Lieu</mat-label>
      <input matInput formControlName="location" placeholder="Ex: Salle de conférence">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>ID Patient *</mat-label>
      <input matInput type="number" formControlName="userId">
      <mat-error *ngIf="eventForm.get('userId')?.invalid">L'ID patient est obligatoire</mat-error>
    </mat-form-field>

    <div class="remind-toggle">
      <mat-slide-toggle formControlName="remindEnabled">
        Activer les rappels
      </mat-slide-toggle>
    </div>

  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Annuler</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="!eventForm.valid">
    {{ isEditMode ? 'Modifier' : 'Planifier' }}
  </button>
</mat-dialog-actions>
