spring.application.name=User-Service
server.port=8081

spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# MongoDB Docker
spring.mongodb.uri=mongodb://admin:admin@mongodb:27017/rayen?authSource=admin

# Eureka Docker
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME_USER}
spring.mail.password=${MAIL_PASSWORD_USER}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=
app.mail.mock-send=false
app.mail.logo-path=

# Frontend URL
app.frontend-url=http://localhost:4200

# Security
app.security.session-days=7
app.security.cookie.secure=false
app.security.cookie.same-site=Lax
security.jwt.secret=ZHVtbXktc2VjcmV0LXNlY3JldC1zZWNyZXQtc2VjcmV0LXNlY3JldC1zZWNyZXQ=

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID}

# Facebook OAuth2
facebook.app-id=${FACEBOOK_APP_ID}
facebook.app-secret=${FACEBOOK_APP_SECRET}
facebook.graph-api-version=${FACEBOOK_GRAPH_API_VERSION}
# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Logs
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.mongodb.driver=INFO
logging.charset.console=UTF-8