# =========================
# APP
# =========================
spring.application.name=User-Service
server.port=8081
app.frontend-url=http://localhost:4200

# =========================
# PAS DE CONFIG SERVER (DEV)
# =========================
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# =========================
# MONGODB LOCAL
# =========================
# Choisir UNE seule option selon ton setup local :

# Option 1: Mongo sans auth
spring.mongodb.uri=mongodb://localhost:27017/rayen

# Option 2: Mongo avec auth
# spring.data.mongodb.uri=mongodb://admin:admin@localhost:27017/rayen?authSource=admin

# =========================
# EUREKA
# =========================
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =========================
# MAIL - Gmail SMTP (optionnel en local : laisser vide si pas d'env MAIL_*)
# =========================
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${APP_MAIL_FROM:}
app.mail.mock-send=false
logging.charset.console=UTF-8

# =========================
# LOGS
# =========================
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.mongodb.driver=INFO

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =========================
# SWAGGER
# =========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =========================
# JWT
# =========================
security.jwt.access-token-minutes=15
security.jwt.refresh-token-days=7
security.jwt.secret=${JWT_SECRET:ZHVtbXktc2VjcmV0LXNlY3JldC1zZWNyZXQtc2VjcmV0LXNlY3JldC1zZWNyZXQ=}

# =========================
# GOOGLE OAUTH2
# =========================
google.client-id=${GOOGLE_CLIENT_ID:}

# =========================
# FACEBOOK OAUTH2
# =========================
facebook.app-id=${FACEBOOK_APP_ID:}
facebook.app-secret=${FACEBOOK_APP_SECRET:}
facebook.graph-api-version=v21.0