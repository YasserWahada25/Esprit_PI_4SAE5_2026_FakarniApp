# =========================
# APP
# =========================
spring.application.name=User-Service
server.port=8081

# =========================
# EUREKA REGISTRATION
# =========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =========================
# PAS DE CONFIG SERVER (DEV)
# =========================
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# =========================
# MONGODB LOCAL ? (Spring Boot 4.x)
# =========================
spring.mongodb.uri=mongodb://localhost:27017/fakarni_user

# (Optionnel: laisser en commentaire pour compat, mais inutile en Boot 4)
# spring.data.mongodb.uri=mongodb://localhost:27017/fakarni_user

# =========================
# LOGS
# =========================
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.mongodb.driver=INFO

# =========================
# ACTUATOR (optionnel)
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =========================
# SWAGGER
# =========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =========================
# JWT
# =========================
security.jwt.access-token-minutes=15
security.jwt.refresh-token-days=7
