<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Service - Visualisation MongoDB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            margin-top: 10px;
        }
        .messages-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .message-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #666;
        }
        .message-content {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 10px;
        }
        .message-meta {
            display: flex;
            gap: 20px;
            font-size: 0.85em;
            color: #999;
        }
        .conversation-badge {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 20px;
        }
        button:hover {
            background: #5568d3;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Chat Service - MongoDB Viewer</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalMessages">0</div>
                <div class="stat-label">Messages Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalConversations">0</div>
                <div class="stat-label">Conversations</div>
            </div>
        </div>

        <button onclick="loadMessages()">🔄 Actualiser</button>

        <div class="messages-container">
            <h2 style="margin-bottom: 20px;">📨 Tous les messages</h2>
            <div id="messagesList"></div>
        </div>
    </div>

    <script>
        function loadMessages() {
            fetch('/api/messages/all')
                .then(response => response.json())
                .then(messages => {
                    displayMessages(messages);
                    updateStats(messages);
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    document.getElementById('messagesList').innerHTML = 
                        '<div class="empty-state">❌ Erreur de chargement</div>';
                });
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesList');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Aucun message pour le moment</div>';
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message-card">
                    <div class="message-header">
                        <span><strong>De:</strong> User ${msg.senderId} → <strong>À:</strong> User ${msg.receiverId}</span>
                        <span class="conversation-badge">${msg.conversationId}</span>
                    </div>
                    <div class="message-content">${msg.content}</div>
                    <div class="message-meta">
                        <span>🆔 ${msg.id}</span>
                        <span>🕐 ${new Date(msg.timestamp).toLocaleString('fr-FR')}</span>
                    </div>
                </div>
            `).join('');
        }

        function updateStats(messages) {
            document.getElementById('totalMessages').textContent = messages.length;
            
            const conversations = new Set(messages.map(m => m.conversationId));
            document.getElementById('totalConversations').textContent = conversations.size;
        }

        // Charger au démarrage
        loadMessages();

        // Auto-refresh toutes les 5 secondes
        setInterval(loadMessages, 5000);
    </script>
</body>
</html>
