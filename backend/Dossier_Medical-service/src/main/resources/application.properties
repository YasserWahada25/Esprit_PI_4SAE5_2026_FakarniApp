spring.application.name=Dossier_Medical-Service
server.port=8059

# DB (fallback H2 local, override with DOSSIER_DB_* for MySQL)
spring.datasource.url=${DOSSIER_DB_URL:jdbc:h2:mem:dossier_medical_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
spring.datasource.username=${DOSSIER_DB_USERNAME:sa}
spring.datasource.password=${DOSSIER_DB_PASSWORD:}
spring.datasource.driver-class-name=${DOSSIER_DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DOSSIER_DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true

# EUREKA (local)
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# CONFIG SERVER
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false