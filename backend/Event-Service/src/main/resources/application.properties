spring.application.name=Event-Service
server.port=8087

# Eureka — démarrer le serveur Eureka (ex. port 8761) avant ce service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# MySQL (XAMPP). Utiliser 127.0.0.1 évite souvent l'échec IPv6 (::1) sous Windows.
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/EventFakerni?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&connectTimeout=10000&socketTimeout=30000&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
# Explicite : si la connexion échoue, Hibernate évite « Unable to determine Dialect without JDBC metadata »
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.config.import=optional:configserver:
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Mailtrap Configuration (Free Email Testing)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=5b9a9cbe0e0e25
spring.mail.password=1fcff3979af9ed
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
