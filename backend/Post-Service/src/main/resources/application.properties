spring.application.name=Post-Service
server.port=8069

# MYSQL (local)
spring.datasource.url=jdbc:mysql://localhost:3306/post_service_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

# CONFIG SERVER
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# EUREKA (local)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# FILE UPLOAD
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.codec.max-in-memory-size=10MB

# JWT
jwt.secret=${JWT_SECRET:ZHVtbXktc2VjcmV0LXNlY3JldC1zZWNyZXQtc2VjcmV0LXNlY3JldC1zZWNyZXQ=}

# FEIGN TIMEOUTS
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000