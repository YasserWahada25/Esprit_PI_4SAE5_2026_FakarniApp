# Profil DOCKER - Activite Educative Service
spring.application.name=activite-educative-service
server.port=8084

# MySQL Docker
spring.datasource.url=jdbc:mysql://db-activite:3306/activite_educative_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Eureka Docker
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.media.upload-dir=/app/uploads
