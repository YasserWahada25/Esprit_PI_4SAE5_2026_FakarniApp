spring.application.name=activite-educative-service

server.port=8084

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# MySQL (XAMPP). 127.0.0.1 pour connexion IPv4 fiable sous Windows.
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/activite_educative_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&connectTimeout=10000&socketTimeout=30000&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
eureka.instance.prefer-ip-address=true

spring.config.import=optional:configserver:
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Swagger (optionnel)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Uploads (miniatures activités, images questions) — servis sous /uploads/**
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
app.media.upload-dir=uploads

# Import contenus externes (optionnel) — utilisé par ExternalContentImportService
# fakarni.import.quiz-url=https://example.com/api/quiz-pack.json
# fakarni.import.image-bank-url=https://example.com/api/image-labels.json
