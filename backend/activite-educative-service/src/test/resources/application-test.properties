spring.application.name=activite-educative-service-test

spring.config.import=optional:configserver:

spring.datasource.url=jdbc:h2:mem:activite_educative_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

spring.cloud.discovery.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

app.media.upload-dir=${java.io.tmpdir}/activite-educative-test-uploads
