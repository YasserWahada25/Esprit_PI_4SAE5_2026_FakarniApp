spring.application.name=Detection_Maladie-Service
server.port=8058

# MYSQL (local)
spring.datasource.url=${DETECTION_DB_URL:jdbc:mysql://localhost:3306/detection_maladie_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DETECTION_DB_USERNAME:root}
spring.datasource.password=${DETECTION_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# EUREKA (local)
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# CONFIG SERVER
spring.cloud.config.enabled=false

# SERVICE FLASK (local)
ia.flask.url=http://localhost:5000

# OPENAI (d�sactiv�)
spring.ai.openai.api-key=NONE
spring.ai.openai.chat.enabled=false

# UPLOAD
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload-dir=uploads/mri

# AUTRE MICROSERVICE (local)
dossier.medical.url=http://localhost:8059