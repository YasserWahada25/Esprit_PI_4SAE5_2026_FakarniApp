# Profil DOCKER - Detection Maladie Service
spring.application.name=Detection-Maladie-Service
server.port=8058

# MySQL Docker
spring.datasource.url=jdbc:mysql://db-detection:3306/detection_maladie_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Eureka Docker
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# MONITORING
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
