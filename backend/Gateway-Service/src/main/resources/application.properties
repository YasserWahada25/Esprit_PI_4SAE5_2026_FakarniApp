spring.application.name=Gateway-Service
server.port=8090

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

## Routes HTTP et CORS sont désormais configurés dans la classe
## Java GatewayServiceApplication (RouteLocator + CorsWebFilter).

# Dev sans Eureka : URL directe du microservice activités (obligatoire si le service n'est pas sur Eureka).
# En prod avec Eureka uniquement, commenter la ligne suivante ou surcharger via variable d'environnement.
gateway.direct.activite-educative-service-uri=http://localhost:8084
