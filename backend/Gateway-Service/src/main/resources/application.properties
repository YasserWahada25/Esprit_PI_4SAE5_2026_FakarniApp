spring.application.name=Gateway-Service
server.port=8090

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Securite JWT (filtre gateway / integration services)
security.jwt.secret=ZHVtbXktc2VjcmV0LXNlY3JldC1zZWNyZXQtc2VjcmV0LXNlY3JldC1zZWNyZXQ=

# Taille max des requetes (images, uploads)
spring.codec.max-in-memory-size=50MB

# Fallback session en dev local
gateway.routes.session.uri=http://localhost:8085

# Dev sans Eureka : URL directe du microservice activites (si non enregistre sur Eureka).
gateway.direct.activite-educative-service-uri=http://localhost:8084

# Routes HTTP : GatewayServiceApplication.java (RouteLocator + CorsWebFilter)

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
