# SonarQube Configuration - Detection Alzheimer (Python)
# Alzheimer Detection AI Service

sonar.projectKey=fakarni-detection-alzheimer
sonar.projectName=Fakarni - Detection Alzheimer (Python)
sonar.projectVersion=1.0.0

# Source directory
sonar.sources=.

# Exclusions
sonar.exclusions=**/venv/**,**/__pycache__/**,**/tests/**,**/*.pyc,**/models/**,**/data/**

# Test directory
sonar.tests=tests

# Python version
sonar.python.version=3.9,3.10,3.11

# Coverage report (if using pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# SonarQube server URL (default for local)
sonar.host.url=http://localhost:9000

# Additional Python-specific settings
sonar.python.xunit.reportPath=test-results.xml
