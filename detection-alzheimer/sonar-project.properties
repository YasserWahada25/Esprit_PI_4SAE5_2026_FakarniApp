# SonarQube Configuration for Detection Alzheimer (Python)
sonar.projectKey=fakarni-detection-alzheimer
sonar.projectName=Fakarni Detection Alzheimer
sonar.projectVersion=1.0

# Source directories
sonar.sources=.
sonar.tests=tests

# Python specific
sonar.language=py
sonar.python.version=3.9

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/venv/**,**/__pycache__/**,**/migrations/**,**/*.pyc,**/models/**,**/weights/**

# Coverage (if using pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# SonarQube server
sonar.host.url=http://localhost:9000
